<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        background-color: aqua;
        

    }
    .cal{
        background-color: gray;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        width: 360px;
        margin: 10px;
        padding: 10px;
        
    }
    .btns{
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(4,60px);
        grid-row: auto;
        
        
    }
    button{
        width: 40px;
        height: 40px;
        border: 2px solid black;
        border-radius: 2cap;

    }
    #in{
        height: 25px;
        width: 200px;
        border: 2px solid black;
        border-radius: 2cap;
        background-color: white;
    }

</style>
<body>
    
<font color="Violet"><h1><i><u>Calculator</u></i></h1> </font>
    <div class="cal">
        <br>
        <input type="text" id="in"  placeholder="Try Calculator" disabled><br>
        <div class="btns">
            <button onclick="clr()">C</button>
            <button onclick="inp('1')">1</button>
            <button onclick="inp('2')">2</button>
            <button onclick="inp('3')">3</button>
            <button onclick="inp('/')">/</button>
            <button onclick="inp('4')">4</button>
            <button onclick="inp('5')">5</button>
            <button onclick="inp('6')">6</button>
            <button onclick="inp('*')">*</button>
            <button onclick="inp('7')">7</button>
            <button onclick="inp('8')">8</button>
            <button onclick="inp('9')">9</button>
            <button onclick="inp('+')">+</button>
            <button onclick="inp('0')">0</button>
            <button onclick="inp('-')">-</button>
            <button onclick="sub()">=</button>
           
        </div>
    </div>
    
    <script>
        function clr(){
            document.getElementById("in").value = "";
            }
        function inp(arg){
            document.getElementById("in").value += arg;
        }
        function sub(){
            let dis=document.getElementById('in');
            dis.value=eval(dis.value);
        }
    </script>
</body>
</html>
