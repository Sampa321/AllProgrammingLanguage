<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
</head>
<body>
    <label for="num">Enter the number:</label>
    <input type="text" name="num" id="num">
    <button type="submit" onclick="checkbox()">submit</button>
    <script>
        function checkbox(){
            let a=perseInt(document.getElementById("num").value);
            for(i=1;i<=a;i++){
                for(j=1;j<=i;j++){
                    Document.write(j+" ");
                }
                document.write("<br>");
            }
        }
    </script>
</body>
